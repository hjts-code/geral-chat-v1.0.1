<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./css/account.css">
</head>
<body>
    <div>
        <ul class="menu">
            <li><a href="index.html"><ion-icon name="home-outline"></ion-icon></a></li>
            <li><a href="docs.html"><ion-icon name="document-text-outline"></ion-icon></a></li>
        </ul>
    </div>
    <div class="account">
        <div class="loginarea">
            <h1>Login</h1>
            <br>
            <input type="email" placeholder="email@exemple.com" required>
            <br><br>
            <input type="password" placeholder="Password" required>
            <br><br>
            <input type="password" placeholder="Confirm password" required>
            <br><br>
            <button type="submit">Login</button>
        </div>
        <br><br>
        <div class="createarea">
            <h1>Create</h1>
            <input type="text" placeholder="NickName" required>
            <br><br>
            <input type="email" placeholder="email@exemple.com" required>
            <br><br>
            <input type="password" placeholder="Password" required>
            <br><br>
            <button type="submit">Create</button>
        </div>
        <h2 align="center">Forgot password? Recover it.</h2>
    </div>
    

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
